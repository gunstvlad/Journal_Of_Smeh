{% extends "base.html" %}
{% block title %} Генератор мемов{% endblock %}

{% block content %}
<div class="meme-generator" style="max-width: 700px; margin: 0 auto; padding: 20px;">
    <h1>Генератор мемов</h1>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="post" class="meme-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="joke_description">Опиши свою шутку:</label>
            <textarea 
                name="joke_description" 
                id="joke_description" 
                rows="4"
                placeholder="Например: кот который понял что понедельник завтра, а он ещё не выспался"
                required
            >{{ joke_description|default:'' }}</textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="text_top">📌 Текст сверху</label>
                <input type="text" name="text_top" id="text_top" 
                       placeholder="Когда понял что..." 
                       value="{{ text_top|default:'' }}">
            </div>
            <div class="form-group">
                <label for="text_bottom">Текст снизу</label>
                <input type="text" name="text_bottom" id="text_bottom" 
                       placeholder="...а завтра понедельник" 
                       value="{{ text_bottom|default:'' }}">
            </div>
        </div>
        
        <button type="submit" class="btn-generate" id="generateBtn">
            Сгенерировать мем
        </button>
    </form>
</div>

<script>
function fillExample(joke, top, bottom) {
    document.getElementById('joke_description').value = joke;
    document.getElementById('text_top').value = top;
    document.getElementById('text_bottom').value = bottom;
    document.getElementById('joke_description').scrollIntoView({ behavior: 'smooth' });
}

</script>

<style>
.meme-generator { font-family: sans-serif; }
.subtitle { color: #666; margin-bottom: 25px; }
.meme-form { background: #f8f9fa; padding: 30px; border-radius: 12px; margin-bottom: 25px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
.form-group textarea, .form-group input, .form-group select {
    width: 100%; padding: 12px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 16px; font-family: inherit;
}
.form-group textarea:focus, .form-group input:focus {
    outline: none; border-color: #6366f1;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.hint { color: #888; font-size: 13px; margin-top: 5px; display: block; }
.checkbox-group label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.btn-generate {
    width: 100%; padding: 15px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; border: none; border-radius: 8px; font-size: 18px;
    font-weight: 600; cursor: pointer; transition: all 0.3s;
}
.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
.btn-generate:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.info-box { background: #e7f3ff; padding: 20px; border-radius: 8px; border-left: 4px solid #2196f3; margin-bottom: 25px; }
.info-box ul { margin: 10px 0 0 20px; }
.info-box li { margin-bottom: 5px; }
.examples { background: #fff3cd; padding: 20px; border-radius: 8px; border-left: 4px solid #ffc107; }
.example-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
.example-item {
    background: white; padding: 10px 15px; border-radius: 6px;
    cursor: pointer; border: 2px solid #e0e0e0; transition: all 0.3s; font-size: 14px;
}
.example-item:hover { border-color: #6366f1; transform: translateY(-2px); }
.alert { padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; }
.alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
</style>
{% endblock %}
